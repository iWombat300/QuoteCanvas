<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteCanvas</title>
</head>
<body>
    <h1 style="font-family:Calibri">QuoteCanvas</h1>

    <div id="input">
        <label for="quote" style="font-family:Calibri">Enter a motivational quote:</label><br>
        <input type="text" id="quote" name="quote" size="50"><br><br>
        <label for="height" style="font-family:Calibri">Canvas Height (px):</label><br>
        <input type="number" id="height" name="height" value="2392"><br><br>
        <label for="width" style="font-family:Calibri">Canvas Width (px):</label><br>
        <input type="number" id="width" name="width" value="1080"><br><br>
        <label for="fontsize" style="font-family:Calibri">Font Size (px):</label><br>
        <input type="number" id="fontsize" name="fontsize" value="68"><br><br>
        <div id="offsets" hidden>
            <label for="x-offset" style="font-family:Calibri">X Offset (px):</label><br>
            <input type="number" id="x-offset" name="x-offset" value="0"><br><br>
            <label for="y-offset" style="font-family:Calibri">Y Offset (px):</label><br>
            <input type="number" id="y-offset" name="y-offset" value="0"><br><br>
        </div>
        <button onclick="toggleAdvanced()" style="font-family:Calibri">Toggle Advanced Options</button>
        <button onclick="generateBackground()" style="font-family:Calibri">Generate Background</button>
    </div>
    <div id="canvas-container" style="height: 600px; margin-top: 20px; margin-bottom: 20px;">
    </div>
    <div id="download" hidden>
        <button onclick="downloadImg()" style="font-family:Calibri">Download Image</button>
    </div>


</body>
<style>
@media (prefers-color-scheme: dark) {
    body {
        background-color: #1c1c1c;
        color: #f0f0f0;
    }
}  
@media (prefers-color-scheme: light) {
    body {
        background-color: #f0f0f0;
        color: #000000;
    }
}
</style>
<script>
    const widthInput = document.getElementById('width');
    const fontSizeInput = document.getElementById('fontsize');

    let fontsizeedited = false;

    widthInput.addEventListener("input", ()=>{
        if (!fontsizeedited){
            fontSizeInput.value=Math.round(widthInput.value/16);
        }
    });

    fontSizeInput.addEventListener("input", ()=>{
        fontsizeedited = true;
    });



    function generateBackground() {
        const quote = document.getElementById('quote').value;
        if (quote.trim() === '') {
            alert('Please enter a motivational quote.');
            return;
        }

        const xOffset = parseInt(document.getElementById('x-offset').value, 10) || 0;
        const yOffset = -1 * (parseInt(document.getElementById('y-offset').value, 10) || 0);
        const canvas = document.createElement('canvas');
        const parsedWidth = parseInt(document.getElementById('width').value, 10);
        const parsedHeight = parseInt(document.getElementById('height').value, 10);
        canvas.width = (Number.isFinite(parsedWidth) && parsedWidth > 0) ? parsedWidth : 1080;
        canvas.height = (Number.isFinite(parsedHeight) && parsedHeight > 0) ? parsedHeight : 2392;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const fontSize = parseInt(document.getElementById('fontsize').value, 10) || 40;
        ctx.font = `${fontSize}px Arial`;
        ctx.fillStyle = '#FFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const lines = wrapText(ctx, quote, canvas.width - 60);
        const lineHeight = Math.ceil(fontSize * 1.2);
        const totalHeight = lines.length * lineHeight;
        let y = (canvas.height - totalHeight) / 2;
        const drawX = canvas.width / 2 + xOffset;
        lines.forEach(line => {
            ctx.fillText(line, drawX, y + yOffset);
            y += lineHeight;
        });

        const dataURL = canvas.toDataURL('image/png');
        const img = new Image();
        img.src = dataURL;
        img.alt = 'Generated motivational quote';
        const container = document.getElementById('canvas-container');
        container.innerHTML = '';
        container.appendChild(img);
        img.style.maxWidth = 'auto';
        img.style.height = '100%';

        // store latest dataURL on container for reliable downloads
        container.dataset.lastImage = dataURL;

        document.getElementById('download').hidden = false;
        fontsizeedited = false;
    }

    function wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let currentLine = words[0] || '';

        for (let i = 1; i < words.length; i++) {
            const word = words[i];
            const width = ctx.measureText(currentLine + ' ' + word).width;
            if (width < maxWidth) {
                currentLine += ' ' + word;
            } else {
                lines.push(currentLine);
                currentLine = word;
            }
        }
        if (currentLine) lines.push(currentLine);
        return lines;
    }
    function downloadImg() {
      const container = document.getElementById('canvas-container');
      const img = container ? container.querySelector('img') : null;
      const src = (container && container.dataset.lastImage) || (img && img.src);
      if (!src) { alert('No image to download'); return; }
      const a = document.createElement('a');
      a.href = src;
      a.download = 'motivational.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function toggleAdvanced() {
        const offsets = document.getElementById('offsets');
        offsets.hidden = !offsets.hidden;
    }
</script>
</html>
